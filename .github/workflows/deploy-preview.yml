name: Deploy Preview

on:
  pull_request:
    branches: [main, master]

jobs:
  deploy-preview:
    name: Deploy to Cloudflare Workers (Preview)
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build
        env:
          BASE_PATH: /

      - name: Deploy to Cloudflare Workers (preview)
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env preview --name qa-consult-pr-${{ github.event.pull_request.number }}

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const url = `https://qa-consult-pr-${{ github.event.pull_request.number }}.bayrakoleg.workers.dev`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `🚀 **Preview deployed!**\n\n${url}\n\n_Deployed from commit ${{ github.sha }}_`,
            });
